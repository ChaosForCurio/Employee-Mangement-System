<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- tailwind blue-500 -->
      <stop offset="100%" stop-color="#1e3a8a" /> <!-- tailwind blue-900 -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Shield/Badge -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#primaryGradient)" filter="url(#shadow)" />

  <!-- Inner Briefcase Icon (adapted from Lucide Briefcase) -->
  <g transform="translate(106, 116) scale(1.17)" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
    <path d="M16 3v4" />
    <path d="M8 3v4" />
    <!-- Center elegant accent -->
    <circle cx="12" cy="14" r="2.5" fill="#ffffff" />
  </g>
</svg>
